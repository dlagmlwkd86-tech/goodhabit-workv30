<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0E1A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <title>좋은습관PT - 과제관리</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet" />
    <style>
      :root{color-scheme:light}
      *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
      html{background:linear-gradient(180deg,#F7F9FC 0%,#EEF2FF 45%,#F8FAFC 100%)}
      body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(180deg,#F7F9FC 0%,#EEF2FF 45%,#F8FAFC 100%);color:#0F172A;min-height:100vh}
      #root{min-height:100vh}
      input,select,textarea,button{font-family:inherit;transition:all .18s ease}
      button{transform:translateZ(0)}
      button:hover{filter:saturate(1.02)}
      button:active{transform:scale(.985)}
      ::selection{background:#FF6B3526}
      ::-webkit-scrollbar{width:6px;height:6px}
      ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:999px}
      ::-webkit-scrollbar-track{background:transparent}
      @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
      @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
      @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      .ai-spin{display:inline-block;animation:spin 1s linear infinite}
      .glass-card{background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.65);box-shadow:0 18px 48px rgba(15,23,42,.08)}
      .soft-ring{box-shadow:0 0 0 1px rgba(255,255,255,.75),0 18px 48px rgba(15,23,42,.08)}
      input:focus,select:focus,textarea:focus{border-color:#FF6B35!important;box-shadow:0 0 0 4px rgba(255,107,53,.12)!important;background:#fff!important}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
